<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💻 Viewer</title>
</head>

<body>

<h2>💻 Recebendo câmera</h2>

<textarea id="input" placeholder="Cole OFFER aqui"></textarea>

<button onclick="connect()">Conectar</button>

<div id="container"></div>

<script>

let pc;

function connect() {

  pc = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" }
    ]
  });

  pc.ontrack = (event) => {

    const video = document.createElement("video");
    video.autoplay = true;
    video.playsInline = true;
    video.srcObject = event.streams[0];

    document.getElementById("container").appendChild(video);

  };

  const offer = JSON.parse(document.getElementById("input").value);

  pc.setRemoteDescription(offer).then(async () => {

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    alert("Conectado! Agora copie o ANSWER se precisar.");

  });

}

</script>

</body>
</html>

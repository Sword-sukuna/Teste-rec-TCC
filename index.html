<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>EduBlock Vision</title>

<link rel="stylesheet" href="style.css">


<!-- 🧠 IA FACIAL -->
<script defer
src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js">
</script>


<!-- 💾 BANCO LOCAL -->
<script defer src="db.js"></script>


<!-- ⚡ SISTEMA -->
<script defer src="script.js"></script>

</head>

<body>

<div class="container">

<h1>🎓 EduBlock Vision</h1>


<!-- 👨‍🎓 CADASTRO -->
<div class="cadastro">

<h2>👨‍🎓 Cadastro facial</h2>

<input
type="text"
id="nome"
placeholder="Nome do aluno"
>

<button id="cadastrar">

Cadastrar rosto

</button>

</div>


<!-- 🔍 BUSCA -->
<input
type="text"
id="buscar"
placeholder="🔍 Buscar aluno"
class="buscar"
>


<!-- 🗑 FERRAMENTAS -->
<div class="ferramentas">

<button id="resetarBanco">

🗑 Resetar banco de dados

</button>

</div>


<!-- 🎥 CAMERA -->
<div class="cameraBox">

<video
id="video"
autoplay
muted
playsinline
></video>

<canvas id="canvas"></canvas>

</div>


<!-- 📋 STATUS -->
<div id="resultado">

📦 Inicializando sistema...

</div>


<!-- 👨‍🎓 LISTA -->
<h2>👨‍🎓 Alunos cadastrados</h2>

<div id="lista"></div>

</div>

</body>
</html>

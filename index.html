<!DOCTYPE html>

      <div class="card">
        <h3 id="totalPresencas">0</h3>
        <p>Presenças</p>

  <!-- CADASTRO -->
  <section id="cadastro" class="secao">

    <h2>👨‍🎓 Cadastro</h2>

    <input type="text" id="nome" placeholder="Nome do aluno">

    <button id="btnCapturar">
      Capturar Face
    </button>

    <video id="video" autoplay playsinline muted></video>

    <canvas id="canvas"></canvas>

    <button id="btnSalvar">
      Salvar Aluno
    </button>

    <h3>📋 Alunos</h3>

    <input type="text" id="buscar" placeholder="Buscar aluno">

    <div id="lista"></div>

  </section>


  <!-- PRESENÇA -->
  <section id="presenca" class="secao">

    <h2>📌 Presença Automática</h2>

    <button id="btnReconhecer">
      Iniciar Reconhecimento
    </button>

    <div id="presencas"></div>

  </section>


  <!-- CAMERA MOBILE -->
  <section id="camera" class="secao">

    <h2>📷 Webcam Mobile</h2>

    <button onclick="gerarQRCodeCamera()">
      Gerar QR
    </button>

    <div id="qrcode"></div>

    <textarea id="answer" placeholder="Cole o answer aqui"></textarea>

    <button onclick="receberAnswer()">
      Conectar Celular
    </button>

  </section>

</div>

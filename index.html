<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Presença Facial</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎓 Sistema de Presença Facial</h1>

<!-- 📷 QR CAMERA -->
<div class="box">

<h2>📷 Conectar Câmera</h2>

<button onclick="gerarQRCodeCamera()">
Gerar QR da Câmera
</button>

<div id="qrcode"></div>

</div>

<!-- 📹 VÍDEO -->
<div class="box">

<h2>📡 Stream</h2>

<video id="video" autoplay playsinline></video>

</div>

<!-- 👨‍🎓 CADASTRO -->
<div class="box">

<h2>Cadastro</h2>

<input id="nome" placeholder="Nome">

<button id="cadastrar">Cadastrar</button>

</div>

<!-- 📋 LISTA -->
<div id="lista"></div>

<!-- 📋 LOGS -->
<div id="logs"></div>

</div>

<!-- 📦 SCRIPTS LOCAIS (SEM CDN) -->
<script src="qrcode.min.js"></script>
<script src="face-api.min.js"></script>

<script defer src="db.js"></script>
<script defer src="rtc.js"></script>
<script defer src="script.js"></script>

</body>
</html>

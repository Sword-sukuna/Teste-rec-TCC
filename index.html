<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FacePresence</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<aside>
<h1>🎓 FacePresence</h1>
<button onclick="sec('dash')">Dashboard</button>
<button onclick="sec('cad')">Cadastro</button>
<button onclick="sec('cam')">Camera</button>
</aside>

<main>

<section id="dash" class="on">
<h2>Dashboard</h2>
<div class="cards">
<div class="card"><h3 id="ta">0</h3><p>Alunos</p></div>
</div>
</section>

<section id="cad">
<h2>Cadastro</h2>
<input id="nome" placeholder="Nome">
<button id="cap">Capturar Face</button>
<button id="save">Salvar</button>
<input id="busca" placeholder="Buscar">
<video id="video" autoplay playsinline muted></video>
<div id="lista"></div>
</section>

<section id="cam">
<h2>Camera Mobile</h2>
<button onclick="gerarQRCodeCamera()">Gerar QR</button>
<div id="qrcode"></div>
<textarea id="answer"></textarea>
<button onclick="receberAnswer()">Conectar</button>
</section>

</main>

<script src="./qrcode.min.js"></script>
<script src="./face-api.min.js"></script>
<script src="./db.js"></script>
<script src="./rtc.js"></script>
<script src="./script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Presença Facial</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎓 Sistema de Presença Facial</h1>

<!-- ========================= -->
<!-- 📷 CÂMERA QR -->
<!-- ========================= -->
<div class="rtcBox">

<h2>📷 Conexão Câmera (Mobile)</h2>

<button onclick="gerarQRCodeCamera()">
📷 Gerar QR da Câmera
</button>

<div id="qrcode"></div>

</div>


<!-- ========================= -->
<!-- 📹 VÍDEO RECEBIDO -->
<!-- ========================= -->
<div class="cameraBox">

<h2>📡 Stream da Câmera</h2>

<video id="video" autoplay playsinline></video>

</div>


<!-- ========================= -->
<!-- 👨‍🎓 CADASTRO -->
<!-- ========================= -->
<div class="cadastro">

<h2>👨‍🎓 Cadastro de Alunos</h2>

<input type="text" id="nome" placeholder="Nome do aluno">

<button id="cadastrar">
Cadastrar
</button>

</div>


<!-- ========================= -->
<!-- 📋 LISTA -->
<!-- ========================= -->
<div id="lista"></div>


<!-- ========================= -->
<!-- 📋 LOGS -->
<!-- ========================= -->
<div id="logs"></div>

</div>

<!-- ========================= -->
<!-- 🔥 SCRIPTS (ORDEM IMPORTA!) -->
<!-- ========================= -->

<!-- QR CODE -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- FACE API -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<!-- DB -->
<script defer src="db.js"></script>

<!-- RTC (CÂMERA + QR) -->
<script defer src="rtc.js"></script>

<!-- MAIN LOGIC -->
<script defer src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width,initial-scale=1.0"
/>

<title>FacePoint Mobile</title>

<link
  rel="stylesheet"
  href="./style.css"
/>

<link rel="icon" href="data:,">

</head>

<body>


<!-- ========================= -->
<!-- 🌌 BACKGROUND -->
<!-- ========================= -->
<div class="bg"></div>


<!-- ========================= -->
<!-- 📱 APP -->
<!-- ========================= -->
<div class="app">


  <!-- HEADER -->
  <header>

    <div class="logo">

      <div class="logo-circle">
        👁
      </div>

      <div>
        <h1>FacePoint</h1>
        <p>Ponto Facial Inteligente</p>
      </div>

    </div>

  </header>



  <!-- CAMERA -->
  <section class="camera-box">

    <video
      id="video"
      autoplay
      playsinline
      muted
    ></video>

    <div class="camera-overlay"></div>

  </section>



  <!-- STATUS -->
  <section class="status-box">

    <div id="status">
      🔎 Aguardando reconhecimento...
    </div>

  </section>



  <!-- CADASTRO -->
  <section class="card">

    <h2>👤 Cadastrar Pessoa</h2>

    <input
      type="text"
      id="nome"
      placeholder="Nome da pessoa"
    />

    <button id="btnCadastrar">
      Cadastrar Rosto
    </button>

  </section>



  <!-- REGISTROS -->
  <section class="card">

    <h2>🕒 Registros de Ponto</h2>

    <div id="registros"></div>

  </section>



  <!-- PESSOAS -->
  <section class="card">

    <h2>📋 Pessoas Cadastradas</h2>

    <div id="lista"></div>

  </section>


</div>



<!-- ========================= -->
<!-- 📦 SCRIPTS -->
<!-- ========================= -->

<script src="./face-api.min.js"></script>

<script src="./db.js"></script>

<script src="./script.js"></script>

</body>
</html>

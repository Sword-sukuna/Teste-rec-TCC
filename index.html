<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Presença Facial</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎓 Sistema de Presença Facial</h1>

<!-- ========================= -->
<!-- 📷 CONEXÃO CAMERA -->
<!-- ========================= -->
<div class="box">

<h2>📷 Conectar Câmera</h2>

<button onclick="gerarQRCodeCamera()">
Gerar QR da Câmera
</button>

<div id="qrcode"></div>

</div>


<!-- ========================= -->
<!-- 📹 PREVIEW -->
<!-- ========================= -->
<div class="box">

<h2>📡 Preview da Câmera</h2>

<video
  id="video"
  autoplay
  playsinline
  muted
></video>

</div>


<!-- ========================= -->
<!-- 📥 ANSWER -->
<!-- ========================= -->
<div class="box">

<h2>📥 Conectar Celular</h2>

<p>
Depois de escanear o QR no celular,
copie o código ANSWER e cole abaixo:
</p>

<textarea
  id="answer"
  placeholder="Cole o ANSWER aqui..."
></textarea>

<br>

<button onclick="receberAnswer()">
Conectar Câmera
</button>

</div>


<!-- ========================= -->
<!-- 👨‍🎓 CADASTRO -->
<!-- ========================= -->
<div class="box">

<h2>👨‍🎓 Cadastro</h2>

<input
  type="text"
  id="nome"
  placeholder="Nome do aluno"
>

<button id="cadastrar">
Cadastrar
</button>

</div>


<!-- ========================= -->
<!-- 📋 LISTA -->
<!-- ========================= -->
<div class="box">

<h2>📋 Alunos</h2>

<div id="lista"></div>

</div>


<!-- ========================= -->
<!-- 📋 LOGS -->
<!-- ========================= -->
<div class="box">

<h2>📋 Logs</h2>

<div id="logs"></div>

</div>

</div>


<!-- ========================= -->
<!-- 📦 SCRIPTS -->
<!-- ========================= -->

<!-- LOCAL -->
<script src="qrcode.min.js"></script>
<script src="face-api.min.js"></script>

<!-- SISTEMA -->
<script defer src="db.js"></script>
<script defer src="rtc.js"></script>
<script defer src="script.js"></script>

</body>
</html>

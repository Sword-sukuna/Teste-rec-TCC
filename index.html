<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduBlock Mobile</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
    }

    h1 {
      text-align: center;
      color: #0d6efd;
    }

    form {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    input, button {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #0d6efd;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #lista {
      display: grid;
      gap: 14px;
    }

    .card {
      background: #f8f9fa;
      border-radius: 14px;
      padding: 14px;
      display: flex;
      gap: 14px;
      align-items: center;
    }

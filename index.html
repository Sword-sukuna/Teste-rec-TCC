<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width,initial-scale=1.0"
/>

<title>EYE GATE Login</title>

<link
  rel="stylesheet"
  href="./style.css"
/>

<link rel="icon" href="data:,">

</head>

<body>


<!-- ========================= -->
<!-- 🌌 BG -->
<!-- ========================= -->
<div class="bg"></div>

<div class="particles"></div>



<!-- ========================= -->
<!-- 🔐 LOGIN -->
<!-- ========================= -->
<div class="login-page">

  <div class="login-card">

    <div class="login-logo">

      <div class="logo-circle">
        👁
      </div>

      <h1>EYE GATE</h1>

      <p>

      Controle de Acesso Inteligente
      </p>
      
    </div>



    <!-- senha -->
    <input
      type="password"
      id="senha"
      placeholder="Senha Administrador"
    />


    <!-- admin -->
    <button onclick="loginAdmin()">

      Entrar como Admin

    </button>


    <!-- monitor -->
    <button
      class="monitor-btn"
      onclick="entrarMonitor()"
    >

      Entrar como Monitor

    </button>


    <p id="erroLogin"></p>

  </div>

</div>



<!-- ========================= -->
<!-- 📦 SCRIPT -->
<!-- ========================= -->
<script src="./login.js"></script>

</body>
</html>

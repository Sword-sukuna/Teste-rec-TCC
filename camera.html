<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Câmera Mobile</title>

<style>

body{

  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;

}

.container{

  padding:20px;

}

video{

  width:100%;
  max-width:500px;
  border-radius:20px;

}

canvas{

  display:none;

}

button{

  margin-top:20px;
  padding:14px;
  width:100%;
  max-width:300px;
  border:none;
  border-radius:12px;
  background:#0d6efd;
  color:white;
  font-size:18px;

}

img{

  margin-top:20px;
  width:200px;
  border-radius:16px;

}

</style>

</head>
<body>

<div class="container">

<h1>📸 Camera Mobile</h1>

<video id="video" autoplay playsinline></video>

<canvas id="canvas"></canvas>

<button id="capturar">
Tirar Foto
</button>

<img id="preview">

</div>

<script type="module">

import {
  db,
  ref,
  set
} from "./firebase.js";

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const preview =
document.getElementById("preview");

const ctx =
canvas.getContext("2d");


// 📷 ABRIR CAMERA
navigator.mediaDevices
.getUserMedia({

  video:{
    facingMode:"environment"
  }

})

.then(stream=>{

  video.srcObject = stream;

})

.catch(err=>{

  alert(
    "Erro ao abrir câmera"
  );

  console.error(err);

});


// 📸 CAPTURAR FOTO
document
.getElementById("capturar")
.addEventListener(
"click",
()=>{

  canvas.width =
  video.videoWidth;

  canvas.height =
  video.videoHeight;

  ctx.drawImage(
    video,
    0,
    0
  );

  const foto =
  canvas.toDataURL(
    "image/png"
  );

  preview.src = foto;

  // ☁️ ENVIAR FIREBASE
  set(
    ref(db,"camera/foto"),
    {

      imagem:foto,
      data:Date.now()

    }
  );

  alert(
    "Foto enviada!"
  );

});

</script>

</body>
</html>
